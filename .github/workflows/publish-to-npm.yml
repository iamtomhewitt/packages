name: Publish Package

on:
  push:
    tags:
      - '*'

env:
  TAG: ${{ github.ref_name }}

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Install
        run: npm ci
      - name: Test
        run: npm run test --if-present
      - name: Build
        run: npm run build --if-present
      - name: Publish ${{ env.TAG }}
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set _authToken=${{ secrets.NPM_PUBLISH_TOKEN }}
          (cd packages/linter/dist && npm publish --access public)